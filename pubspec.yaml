name: mental
description: Mental — a constellation of lifetime mastery. Skyrim-style skill trees for real-life wisdom.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1 # generates the iOS app icon from app_icon.png

# Run: dart run flutter_launcher_icons   (regenerates ios/Runner AppIcon set)
flutter_launcher_icons:
  ios: true
  remove_alpha_ios: true
  image_path: "assets/brand/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
  fonts:
    # Variable fonts (weight axis) — select weights via FontVariation in theme.dart.
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel.ttf
    - family: Raleway
      fonts:
        - asset: assets/fonts/Raleway.ttf
