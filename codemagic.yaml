workflows:
  ios-testflight:
    name: Mental · iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_asc   # same API key name as physical
    environment:
      groups:
        - ios_signing                     # env-var group with CERTIFICATE_PRIVATE_KEY
      vars:
        BUNDLE_ID: "com.cemiloglu.mental"
        APP_STORE_APPLE_ID: "6786270013"  # ← paste the numeric Apple ID from App Store Connect
      xcode: latest
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build Wisdom web app
        script: |
          cd Wisdom
          npm ci
          npm run build

      - name: Sync webapp into iOS bundle
        script: |
          rm -rf ios/Mental/webapp
          cp -r Wisdom/dist ios/Mental/webapp

      - name: Build signed IPA
        script: |
          cd ios
          xcode-project build-ipa \
            --workspace Mental.xcodeproj/project.xcworkspace \
            --scheme Mental \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/**/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
