# Codemagic CI — build Mental for iOS on a cloud Mac and ship to TestFlight,
# no local Mac required. Mirrors physical's proven workflow; the same
# `codemagic_asc` App Store Connect integration and `ios_signing` env-var
# group (CERTIFICATE_PRIVATE_KEY) are reused.

workflows:
  ios-testflight:
    name: Mental · iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_asc
    environment:
      groups:
        - ios_signing # holds CERTIFICATE_PRIVATE_KEY (secure)
      vars:
        BUNDLE_ID: "com.cemiloglu.mental"
        APP_STORE_APPLE_ID: 6786270013 # numeric Apple ID from App Store Connect
        # The Examiner backend (see backend/DEPLOY.md): after deploying to
        # Railway, add BACKEND_URL and APP_TOKEN as environment variables in
        # the Codemagic UI (App settings → Environment variables — Codemagic
        # rejects empty vars here in the yaml). Until then the build script
        # defaults them to empty and the app ignites on the honour system.
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze
        script: flutter analyze
      - name: Test
        script: flutter test
      - name: Build signed IPA
        script: |
          # $BUILD_NUMBER is Codemagic's auto-incrementing counter.
          flutter build ipa --release \
            --build-name=0.2.0 \
            --build-number=$BUILD_NUMBER \
            --dart-define=BACKEND_URL=${BACKEND_URL:-} \
            --dart-define=APP_TOKEN=${APP_TOKEN:-} \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
